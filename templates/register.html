{% extends 'layout.html' %}

{% block title %}Cyber Brew Coffee - Registrasi{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Daftar Akun Baru</h2>
        <p class="auth-subtitle">Buat akun untuk memesan kopi favorit dan mendapatkan promo menarik.</p>
        
        <form action="/register" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Pilih username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Pilih password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Daftar Akun</button>
        </form>
        
        <div class="auth-footer">
            Sudah punya akun? <a href="/login" style="font-weight: 600;">Login Disini</a>
        </div>
        

    </div>
</div>
{% endblock %}
