{% extends 'layout.html' %}

{% block title %}Cyber Brew Coffee - Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Login Akun</h2>
        <p class="auth-subtitle">Masuk untuk menikmati kopi favorit dan melacak pesanan Anda.</p>
        
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Masukkan username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Masukkan password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>
        
        <div class="auth-footer">
            Belum punya akun? <a href="/register" style="font-weight: 600;">Daftar Sekarang</a>
        </div>
    </div>
</div>
{% endblock %}
